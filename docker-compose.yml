services:
  db:
    # Plain Postgres 16 (the env mirror only serves official library/* images,
    # so pgvector/pgvector can't be pulled here). This is fine for now: step 1
    # only stores JSON — pgvector isn't needed until embeddings (PLAN step 3),
    # at which point a Dockerfile builds pgvector from source on this same
    # postgres:16 base (same PG major => volume stays compatible, no migration).
    # pg_trgm + fuzzystrmatch ship as contrib in postgres:16 already.
    build: ./db                # postgres:16 + pgvector built from source (see db/Dockerfile)
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # ponytail: 5434 not 5432 — host port 5432 is held by a stale Docker Desktop
      # proxy (collateral from a prior teardown). Internal container port stays 5432,
      # so the backend still reaches db:5432 over the network. NOTE: .env still says
      # POSTGRES_PORT=5432 for host scripts; to run ingest/seed from the host, either
      # restart Docker to reclaim 5432 or set .env POSTGRES_PORT=5434.
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pocsearch

  backend:
    build: ./backend
    ports:
      # ponytail: 8002 not 8000 — host port 8000 is held by a stale Docker Desktop
      # port-forward proxy from a prior torn-down run; 8001 is a real uvicorn dev server
      # from another project (don't touch). Internal container port stays 8000, so
      # next.config.mjs rewrites (http://backend:8000) are unaffected.
      - "8002:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db          # inside compose: reach the db service by name, not localhost
      POSTGRES_PORT: 5432
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT}  # query embedding for vector search
      LLM_ENDPOINT: ${LLM_ENDPOINT}  # on-add modern-word extraction (graceful if unset)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pocsearch

  frontend:
    build: ./frontend
    ports:
      # ponytail: 3001 not 3000 — host port 3000 held by a stale Docker Desktop proxy.
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - pocsearch

volumes:
  pgdata:

networks:
  pocsearch:
    driver: bridge
